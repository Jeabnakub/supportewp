  <style>
    * { font-family: 'Sarabun', sans-serif; }
    .gradient-header {
      background: linear-gradient(135deg, #1e40af 0%, #3b82f6 50%, #0ea5e9 100%);
    }
    .card-shadow {
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }
    select, input, textarea {
      font-size: 14px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%);
    }
    .btn-success {
      background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
    }
    .btn-success:hover {
      background: linear-gradient(135deg, #15803d 0%, #166534 100%);
    }
    .btn-danger {
      background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
    }
    .btn-danger:hover {
      background: linear-gradient(135deg, #b91c1c 0%, #991b1b 100%);
    }
    .status-badge {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 20px;
    }
    .live-status {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(34, 197, 94, 0.15);
      backdrop-filter: blur(12px);
      padding: 10px 18px;
      border-radius: 25px;
      font-size: 14px;
      font-weight: 600;
      color: #10b981;
      border: 1.5px solid rgba(34, 197, 94, 0.3);
      box-shadow: 0 8px 32px rgba(34, 197, 94, 0.1);
    }
    .status-dot {
      width: 10px;
      height: 10px;
      background: #10b981;
      border-radius: 50%;
      animation: pulse 2.5s infinite;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%, 100% {
        opacity: 1;
        box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.5);
      }
      50% {
        opacity: 0.9;
      }
      70% {
        box-shadow: 0 0 0 10px rgba(16, 185, 129, 0);
      }
    }
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      pointer-events: none;
    }
    .toast {
      background: white;
      padding: 16px 20px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 300px;
      pointer-events: auto;
      animation: slideIn 0.4s ease-out;
      border-left: 4px solid #10b981;
    }
    .toast.success {
      border-left-color: #10b981;
    }
    .toast.error {
      border-left-color: #dc2626;
    }
    .toast.info {
      border-left-color: #3b82f6;
    }
    .toast-icon {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .toast.success .toast-icon { color: #10b981; }
    .toast.error .toast-icon { color: #dc2626; }
    .toast.info .toast-icon { color: #3b82f6; }
    .toast-text {
      font-size: 14px;
      font-weight: 500;
      color: #1f2937;
      line-height: 1.4;
    }
    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    @keyframes slideOut {
      from {
        transform: translateX(0);
        opacity: 1;
      }
      to {
        transform: translateX(100%);
        opacity: 0;
      }
    }
    .toast.hide {
      animation: slideOut 0.4s ease-out forwards;
    }
  </style>

ption value="นางสาววรีรัตน์ สดชื่นจิต">นางสาววรีรัตน์ สดชื่นจิต</option> <option value="นางสาวศิริปรมินทร์ ขันติคเชนชาติ">นางสาวศิริปรมินทร์ ขันติคเชนชาติ</option> <option value="นางสุมาลี รักไทย">นางสุมาลี รักไทย</option> </optgroup> </select>

   </div>

  <script>
    // Configuration
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzW-wVSH0Kjgfe68Jytgfb2vKEUliHMfBlqGbY_qdXa1GawU9oV6EMfPen7dp1ZF_4m/exec';
    
    // Default configuration
    const defaultConfig = {
      system_title: 'ระบบบันทึกข้อมูล สรุปรายงานการปฏิบัติงาน'
    };

    let currentEditingRow = null;
    let isEditMode = false;

    // Toast notification system
    function showToast(message, type = 'success', duration = 3000) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      
      let icon = '✓';
      if (type === 'error') icon = '✕';
      if (type === 'info') icon = 'ℹ';
      
      toast.innerHTML = `
        <div class="toast-icon">${icon}</div>
        <div class="toast-text">${message}</div>
      `;
      
      container.appendChild(toast);
      
      setTimeout(() => {
        toast.classList.add('hide');
        setTimeout(() => toast.remove(), 400);
      }, duration);
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', function() {
      updateDateTime();
      setInterval(updateDateTime, 1000);
    });

    // Format Thai Date Time
    function formatThaiDateTime(date) {
      const thaiMonths = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน', 
                         'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];
      const thaiYear = date.getFullYear() + 543;
      const day = date.getDate();
      const month = thaiMonths[date.getMonth()];
      const hours = String(date.getHours()).padStart(2, '0');
      const minutes = String(date.getMinutes()).padStart(2, '0');
      const seconds = String(date.getSeconds()).padStart(2, '0');
      
      return `${day} ${month} ${thaiYear} เวลา ${hours}:${minutes}:${seconds} น.`;
    }

    // Update date time fields
    function updateDateTime() {
      const now = new Date();
      const thaiDateTime = formatThaiDateTime(now);
      document.getElementById('currentDate').value = thaiDateTime;
      document.getElementById('lastStatusDateTime').value = thaiDateTime;
    }

    // Enable edit mode
    function enableEdit() {
      isEditMode = true;
      Swal.fire({
        icon: 'info',
        title: 'โหมดแก้ไขข้อมูล',
        text: 'คุณสามารถแก้ไขข้อมูลในฟอร์มได้แล้ว กรุณาแก้ไขข้อมูลแล้วกดบันทึก',
        confirmButtonText: 'ตกลง',
        confirmButtonColor: '#3b82f6'
      });
    }
    function clearForm() {
      Swal.fire({
        icon: 'question',
        title: 'ยืนยันการล้างฟอร์ม',
        text: 'คุณต้องการล้างข้อมูลในฟอร์มทั้งหมดหรือไม่?',
        showCancelButton: true,
        confirmButtonText: 'ล้างฟอร์ม',
        cancelButtonText: 'ยกเลิก',
        confirmButtonColor: '#dc2626',
        cancelButtonColor: '#6b7280'
      }).then((result) => {
        if (result.isConfirmed) {
          document.getElementById('caseForm').reset();
          updateDateTime();
          currentEditingRow = null;
          isEditMode = false;
          document.getElementById('searchResultsCard').classList.add('hidden');
          showToast('ล้างฟอร์มเรียบร้อยแล้ว', 'info');
        }
      });
    }

    // Submit form via JSONP
    function submitForm(event) {
      event.preventDefault();
      
      // Validate all required fields
      const requiredFields = [
        { id: 'sequence', name: 'ลำดับที่' },
        { id: 'staffName', name: 'ชื่อ-นามสกุล' },
        { id: 'workGroup', name: 'กลุ่มงาน' },
        { id: 'caseNumber', name: 'หมายเลข Case' },
        { id: 'caseType', name: 'ประเภท Case' },
        { id: 'receivedDateTime', name: 'วันเวลาที่ได้รับมอบ Case' },
        { id: 'caseProblem', name: 'ปัญหาจาก Case ที่พบ' },
        { id: 'status', name: 'สถานะการดำเนินการ' }
      ];

      let missingFields = [];
      requiredFields.forEach(field => {
        const value = document.getElementById(field.id).value.trim();
        if (!value) {
          missingFields.push(field.name);
        }
      });

      // If there are missing fields, show error alert
      if (missingFields.length > 0) {
        Swal.fire({
          icon: 'error',
          title: 'กรุณากรอกข้อมูลให้ครบถ้วน',
          html: `<div style="text-align: left; padding: 10px;">
            <p style="margin-bottom: 10px;">ฟิลด์ที่ยังไม่ได้กรอก:</p>
            <ul style="list-style: none; padding: 0;">
              ${missingFields.map(field => `<li style="padding: 5px 0; color: #dc2626;">• ${field}</li>`).join('')}
            </ul>
          </div>`,
          confirmButtonText: 'ตกลง',
          confirmButtonColor: '#dc2626'
        });
        return;
      }
      
      const caseNum = document.getElementById('caseNumber').value;
      const formData = {
        action: currentEditingRow ? 'update' : 'create',
        rowNumber: currentEditingRow,
        sequence: document.getElementById('sequence').value,
        currentDate: document.getElementById('currentDate').value,
        staffName: document.getElementById('staffName').value,
        workGroup: document.getElementById('workGroup').value,
        caseNumber: caseNum,
        caseType: document.getElementById('caseType').value,
        receivedDateTime: document.getElementById('receivedDateTime').value,
        caseProblem: document.getElementById('caseProblem').value,
        status: document.getElementById('status').value,
        lastStatusDateTime: document.getElementById('lastStatusDateTime').value
      };

      // Show loading
      Swal.fire({
        title: 'กำลังบันทึกข้อมูล...',
        html: 'กรุณารอสักครู่',
        allowOutsideClick: false,
        didOpen: () => {
          Swal.showLoading();
        }
      });

      // Send via JSONP
      sendJSONP(formData, function(response) {
        Swal.close();
        if (response && response.success) {
          showToast(`✅ บันทึก Case: ${caseNum} เรียบร้อยแล้ว`, 'success', 4000);
          Swal.fire({
            icon: 'success',
            title: 'บันทึกสำเร็จ!',
            text: currentEditingRow ? 'อัปเดตข้อมูลเรียบร้อยแล้ว' : 'บันทึกข้อมูลเรียบร้อยแล้ว',
            confirmButtonText: 'ตกลง',
            confirmButtonColor: '#16a34a'
          }).then(() => {
            document.getElementById('caseForm').reset();
            updateDateTime();
            currentEditingRow = null;
            isEditMode = false;
            document.getElementById('searchResultsCard').classList.add('hidden');
          });
        } else {
          showToast('❌ เกิดข้อผิดพลาด ไม่สามารถบันทึกได้', 'error', 4000);
          Swal.fire({
            icon: 'error',
            title: 'เกิดข้อผิดพลาด',
            text: response ? response.message : 'ไม่สามารถบันทึกข้อมูลได้ กรุณาลองใหม่อีกครั้ง',
            confirmButtonText: 'ตกลง',
            confirmButtonColor: '#dc2626'
          });
        }
      });
    }

    // JSONP function
    function sendJSONP(data, callback) {
      const callbackName = 'jsonpCallback_' + Date.now();
      
      window[callbackName] = function(response) {
        callback(response);
        delete window[callbackName];
        const script = document.getElementById(callbackName);
        if (script) script.remove();
      };

      const params = new URLSearchParams();
      params.append('callback', callbackName);
      for (const key in data) {
        params.append(key, data[key] || '');
      }

      const script = document.createElement('script');
      script.id = callbackName;
      script.src = SCRIPT_URL + '?' + params.toString();
      script.onerror = function() {
        callback({ success: false, message: 'Network error' });
        delete window[callbackName];
        script.remove();
      };
      document.body.appendChild(script);

      // Timeout after 30 seconds
      setTimeout(function() {
        if (window[callbackName]) {
          callback({ success: false, message: 'Request timeout' });
          delete window[callbackName];
          const s = document.getElementById(callbackName);
          if (s) s.remove();
        }
      }, 30000);
    }

    // Show search modal
    function showSearchModal() {
      document.getElementById('searchModal').classList.remove('hidden');
      document.getElementById('searchModal').classList.add('flex');
      document.getElementById('searchCaseNumber').value = '';
      document.getElementById('searchCaseNumber').focus();
    }

    // Close search modal
    function closeSearchModal() {
      document.getElementById('searchModal').classList.add('hidden');
      document.getElementById('searchModal').classList.remove('flex');
    }

    // Search case
    function searchCase() {
      const caseNumber = document.getElementById('searchCaseNumber').value.trim();
      
      if (!caseNumber) {
        Swal.fire({
          icon: 'warning',
          title: 'กรุณากรอกหมายเลข Case',
          confirmButtonText: 'ตกลง',
          confirmButtonColor: '#f59e0b'
        });
        return;
      }

      closeSearchModal();

      Swal.fire({
        title: 'กำลังค้นหาข้อมูล...',
        html: 'กรุณารอสักครู่',
        allowOutsideClick: false,
        didOpen: () => {
          Swal.showLoading();
        }
      });

      sendJSONP({ action: 'search', caseNumber: caseNumber }, function(response) {
        Swal.close();
        
        if (response && response.success && response.data) {
          displaySearchResults(response.data, response.rowNumber);
        } else {
          Swal.fire({
            icon: 'info',
            title: 'ไม่พบข้อมูล',
            text: 'ไม่พบ Case หมายเลข ' + caseNumber + ' ในระบบ',
            confirmButtonText: 'ตกลง',
            confirmButtonColor: '#3b82f6'
          });
        }
      });
    }

    function displaySearchResults(data, rowNumber) {

      const content = document.getElementById('searchResultsContent');

        'แจ้งคำตอบของ OS ให้นายจ้างทราบพร้อมปิดเคส',
        'ปิดเคส',
        'ผู้ยื่นแจ้งยกเลิก Case',
        'รอเอกสารเพิ่มเติม',
        'รอเอกสารเพิ่มเติม/สอบถามข้อมูลผู้ยื่น',
        'ส่งต่อกลุ่มงานพัฒนาระบบ',
        'ส่งต่อกลุ่มงานพิจารณา 1',
        'ส่งต่อกลุ่มงานมติ ครม',
        'ส่งต่อฝ่ายทะเบียนเพื่อตรวจสอบข้อมูล',
        'ส่งต่อ OS เพื่อแก้ไข'
      ];

      const statusOptionsHTML = statusOptions.map(opt => 
        `<option value="${opt}" ${data.status === opt ? 'selected' : ''}>${opt}</option>`
      ).join('');

      content.innerHTML = `
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
          <div class="bg-gray-50 rounded-lg p-3">
            <span class="text-xs text-gray-500 font-medium">ลำดับที่</span>
            <p class="text-gray-800 font-semibold">${data.sequence || '-'}</p>
          </div>
          <div class="bg-gray-50 rounded-lg p-3">
            <span class="text-xs text-gray-500 font-medium">วันที่ปัจจุบัน</span>
            <p class="text-gray-800 font-semibold">${data.currentDate || '-'}</p>
          </div>
          <div class="bg-gray-50 rounded-lg p-3">
            <span class="text-xs text-gray-500 font-medium">ชื่อ-นามสกุล</span>
            <p class="text-gray-800 font-semibold">${data.staffName || '-'}</p>
          </div>
          <div class="bg-gray-50 rounded-lg p-3">
            <span class="text-xs text-gray-500 font-medium">กลุ่มงาน</span>
            <p class="text-gray-800 font-semibold">${data.workGroup || '-'}</p>
          </div>
          <div class="bg-blue-50 rounded-lg p-3 border-2 border-blue-200">
            <span class="text-xs text-blue-600 font-medium">หมายเลข Case</span>
            <p class="text-blue-800 font-bold text-lg">${data.caseNumber || '-'}</p>
          </div>
          <div class="bg-gray-50 rounded-lg p-3">
            <span class="text-xs text-gray-500 font-medium">ประเภท Case</span>
            <p class="text-gray-800 font-semibold">${data.caseType || '-'}</p>
          </div>
          <div class="bg-gray-50 rounded-lg p-3 md:col-span-2">
            <span class="text-xs text-gray-500 font-medium">วันเวลาที่ได้รับมอบ Case</span>
            <p class="text-gray-800 font-semibold">${data.receivedDateTime || '-'}</p>
          </div>
          <div class="bg-gray-50 rounded-lg p-3 md:col-span-2">

            <p class="text-gray-800">${data.caseProblem || '-'}</p>
          </div>
          <div class="bg-green-50 rounded-lg p-3 md:col-span-2 border-2 border-green-200">
            <span class="text-xs text-green-600 font-medium">สถานะการดำเนินการ (แก้ไขได้)</span>
            <select id="editStatus" class="w-full mt-2 px-3 py-2 border-2 border-green-300 rounded-lg focus:border-green-500 focus:ring-2 focus:ring-green-200">
              ${statusOptionsHTML}
            </select>
          </div>
          <div class="bg-gray-50 rounded-lg p-3 md:col-span-2">
            <span class="text-xs text-gray-500 font-medium">วันเวลาที่แจ้งสถานะล่าสุด</span>
            <p class="text-gray-800 font-semibold">${data.lastStatusDateTime || '-'}</p>
          </div>
        </div>
        <div class="flex flex-wrap gap-3 justify-center pt-4 border-t-2 border-gray-100">
          <button onclick="updateStatus(${rowNumber}, '${data.caseNumber}')" class="btn-success text-white px-6 py-2.5 rounded-lg font-semibold shadow-md transition-all flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
            บันทึกการเปลี่ยนสถานะ
          </button>
          <button onclick="loadToForm(${rowNumber})" class="bg-gradient-to-r from-blue-500 to-blue-600 hover:from-blue-600 hover:to-blue-700 text-white px-6 py-2.5 rounded-lg font-semibold shadow-md transition-all flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>

          </button>
        </div>
      `;

      // Store current data for form loading
      card.dataset.currentData = JSON.stringify(data);
      card.classList.remove('hidden');
      
      // Scroll to results
      card.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // Update status only
    function updateStatus(rowNumber, caseNumber) {
      const newStatus = document.getElementById('editStatus').value;
      const now = new Date();
      const newLastStatusDateTime = formatThaiDateTime(now);

      Swal.fire({
        title: 'กำลังอัปเดตสถานะ...',
        html: 'กรุณารอสักครู่',
        allowOutsideClick: false,
        didOpen: () => {
          Swal.showLoading();
        }
      });

      sendJSONP({
        action: 'updateStatus',
        rowNumber: rowNumber,
        status: newStatus,
        lastStatusDateTime: newLastStatusDateTime
      }, function(response) {
        Swal.close();
        if (response && response.success) {
          showToast(`📝 บันทึกการเปลี่ยนสถานะ Case: ${caseNumber} เรียบร้อย`, 'success', 4000);
          Swal.fire({
            icon: 'success',
            title: 'อัปเดตสถานะสำเร็จ!',
            text: 'สถานะของ Case ' + caseNumber + ' ถูกเปลี่ยนแล้ว',
            confirmButtonText: 'ตกลง',
            confirmButtonColor: '#16a34a'
          }).then(() => {
            document.getElementById('caseForm').reset();
            updateDateTime();
            currentEditingRow = null;
            isEditMode = false;
            document.getElementById('searchResultsCard').classList.add('hidden');
          });
        } else {
          showToast('❌ เกิดข้อผิดพลาด ไม่สามารถอัปเดตสถานะได้', 'error', 4000);
          Swal.fire({
            icon: 'error',
            title: 'เกิดข้อผิดพลาด',
            text: 'ไม่สามารถอัปเดตสถานะได้ กรุณาลองใหม่',
            confirmButtonText: 'ตกลง',
            confirmButtonColor: '#dc2626'
          });
        }
      });
    }

    // Load data to form for full edit
    function loadToForm(rowNumber) {
      const card = document.getElementById('searchResultsCard');
      const data = JSON.parse(card.dataset.currentData);

      document.getElementById('sequence').value = data.sequence || '';
      document.getElementById('currentDate').value = data.currentDate || '';
      document.getElementById('staffName').value = data.staffName || '';
      document.getElementById('workGroup').value = data.workGroup || '';
      document.getElementById('caseNumber').value = data.caseNumber || '';
      document.getElementById('caseType').value = data.caseType || '';
      document.getElementById('receivedDateTime').value = data.receivedDateTime || '';
      document.getElementById('caseProblem').value = data.caseProblem || '';
      document.getElementById('status').value = data.status || '';
      document.getElementById('lastStatusDateTime').value = formatThaiDateTime(new Date());

      currentEditingRow = rowNumber;
      isEditMode = true;

      // Scroll to form
      document.getElementById('caseForm').scrollIntoView({ behavior: 'smooth', block: 'start' });

      Swal.fire({
        icon: 'info',
        title: 'โหลดข้อมูลสำเร็จ',
        text: 'ข้อมูลถูกโหลดไปยังฟอร์มแล้ว คุณสามารถแก้ไขและบันทึกได้',
        confirmButtonText: 'ตกลง',
        confirmButtonColor: '#3b82f6'
      });
    }

    // Element SDK Integration
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig: defaultConfig,
        onConfigChange: async (config) => {
          const titleEl = document.getElementById('systemTitle');
          if (titleEl) {
            titleEl.textContent = config.system_title || defaultConfig.system_title;
          }
        },
        mapToCapabilities: (config) => ({
          recolorables: [],
          borderables: [],
          fontEditable: undefined,
          fontSizeable: undefined
        }),
        mapToEditPanelValues: (config) => new Map([
          ['system_title', config.system_title || defaultConfig.system_title]
        ])
      });
    }
  </script>
