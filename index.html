  <style>
    * { font-family: 'Sarabun', sans-serif; }
    
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #164e63 100%);
      min-height: 100%;
    }
    
    .gradient-header {
      background: linear-gradient(135deg, #0f766e 0%, #14b8a6 50%, #2dd4bf 100%);
      box-shadow: 0 20px 60px rgba(15, 118, 110, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      border-bottom: 3px solid rgba(45, 212, 191, 0.3);
    }
    
    .card-shadow {
      background: rgba(255, 255, 255, 0.95) !important;
      box-shadow: 0 20px 70px rgba(0, 0, 0, 0.3), inset 0 1px 2px rgba(255, 255, 255, 0.5);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(10px);
    }
    
    .card-shadow:hover {
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.35), inset 0 1px 2px rgba(255, 255, 255, 0.6);
      transform: translateY(-4px);
      background: rgba(255, 255, 255, 1) !important;
    }
    
    .input-focus {
      transition: all 0.3s ease;
      background: #ffffff;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
    }
    
    .input-focus:focus {
      box-shadow: 0 0 0 4px rgba(20, 184, 166, 0.3), 0 8px 20px rgba(20, 184, 166, 0.2);
      border-color: #14b8a6 !important;
      background: #ffffff;
    }
    
    .input-focus::placeholder {
      color: #9ca3af;
      font-size: 13px;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #0f766e 0%, #14b8a6 100%);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 10px 30px rgba(20, 184, 166, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.2);
      position: relative;
      overflow: hidden;
    }
    
    .btn-primary:hover {
      background: linear-gradient(135deg, #0d6b63 0%, #12a89d 100%);
      transform: translateY(-4px);
      box-shadow: 0 15px 40px rgba(20, 184, 166, 0.5);
    }
    
    .btn-success {
      background: linear-gradient(135deg, #047857 0%, #10b981 100%);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 10px 30px rgba(16, 185, 129, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.2);
      position: relative;
      overflow: hidden;
    }
    
    .btn-success:hover {
      background: linear-gradient(135deg, #065f46 0%, #059669 100%);
      transform: translateY(-4px);
      box-shadow: 0 15px 40px rgba(16, 185, 129, 0.5);
    }
    
    .btn-danger {
      background: linear-gradient(135deg, #991b1b 0%, #dc2626 100%);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 10px 30px rgba(220, 38, 38, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.2);
      position: relative;
      overflow: hidden;
    }
    
    .btn-danger:hover {
      background: linear-gradient(135deg, #7f1d1d 0%, #b91c1c 100%);
      transform: translateY(-4px);
      box-shadow: 0 15px 40px rgba(220, 38, 38, 0.5);
    }
    
    .btn-warning {
      background: linear-gradient(135deg, #b45309 0%, #d97706 100%);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 10px 30px rgba(217, 119, 6, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.2);
      position: relative;
      overflow: hidden;
    }
    
    .btn-warning:hover {
      background: linear-gradient(135deg, #92400e 0%, #b45309 100%);
      transform: translateY(-4px);
      box-shadow: 0 15px 40px rgba(217, 119, 6, 0.5);
    }
    
    select, input, textarea {
      font-size: 15px;
      transition: all 0.2s ease;
    }
    
    input:disabled, select:disabled {
      background: #f3f4f6 !important;
      color: #6b7280;
    }
    
    .form-label {
      font-size: 15px;
      font-weight: 700;
      background: linear-gradient(135deg, #0f766e, #14b8a6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      display: block;
      margin-bottom: 0.75rem;
    }
    
    .section-title {
      font-size: 20px;
      background: linear-gradient(135deg, #0f766e, #14b8a6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 800;
      letter-spacing: 0.5px;
    }
    
    h1 {
      font-weight: 800;
      letter-spacing: -0.5px;
      font-size: 26px;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }
    
    input, select, textarea {
      font-weight: 500;
      letter-spacing: 0.2px;
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes fadeInScale {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
    
    @keyframes pulse-glow {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(20, 184, 166, 0.7);
      }
      50% {
        box-shadow: 0 0 0 10px rgba(20, 184, 166, 0);
      }
    }
    
    @keyframes spin-smooth {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }
    
    @keyframes slideInStagger {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    
    @keyframes buttonPress {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(0.95);
      }
      100% {
        transform: scale(1);
      }
    }
    
    @keyframes ripple {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }
    
    @keyframes wave {
      0% { transform: translateX(0); }
      50% { transform: translateX(25px); }
      100% { transform: translateX(0); }
    }
    
    @keyframes floatingLabel {
      0% { transform: translateY(0); opacity: 0; }
      100% { transform: translateY(-8px); opacity: 1; }
    }
    
    @keyframes smoothScroll {
      from { transform: translateY(0); }
      to { transform: translateY(-20px); }
    }
    
    .fade-in {
      animation: fadeInUp 0.6s ease-out;
    }
    
    .fade-in-scale {
      animation: fadeInScale 0.5s ease-out;
    }
    
    .pulse-glow {
      animation: pulse-glow 2s infinite;
    }
    
    .spin-smooth {
      animation: spin-smooth 1s linear infinite;
    }
    
    /* Staggered animations for search results */
    .stagger-1 { animation: slideInStagger 0.4s ease-out 0.1s both; }
    .stagger-2 { animation: slideInStagger 0.4s ease-out 0.2s both; }
    .stagger-3 { animation: slideInStagger 0.4s ease-out 0.3s both; }
    .stagger-4 { animation: slideInStagger 0.4s ease-out 0.4s both; }
    
    /* Button press effect with ripple */
    button:active {
      animation: buttonPress 0.2s ease-out;
    }
    
    button::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.6);
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    
    button:active::after {
      animation: ripple 0.6s ease-out;
    }
    
    /* Header entrance animation */
    header {
      animation: fadeInDown 0.8s ease-out;
    }
    
    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    /* Form card entrance animation */
    form {
      animation: fadeInScale 0.7s ease-out;
    }
    
    /* Search results card animation */
    #searchResults {
      animation: fadeInUp 0.5s ease-out;
    }
    
    /* Input field glow effect on focus */
    input:focus, select:focus, textarea:focus {
      animation: pulse-glow 1.5s ease-out;
    }
    
    /* Ripple button styles */
    button {
      position: relative;
      overflow: hidden;
    }
    
    /* Wave animation for form */
    .form-wave::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 200%;
      height: 60px;
      background: linear-gradient(90deg, rgba(20,184,166,0.1) 25%, rgba(20,184,166,0.05) 50%, rgba(20,184,166,0.1) 75%);
      animation: wave 3s linear infinite;
    }
    
    /* Floating animation for labels */
    .floating-label {
      animation: floatingLabel 0.6s ease-out;
    }
    
    /* Gradient shift on buttons */
    .btn-primary, .btn-success, .btn-danger, .btn-warning {
      background-size: 200% 200%;
      animation: gradientShift 6s ease infinite;
    }
    
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    /* Smooth card entrance */
    .card-shadow {
      animation: fadeInUp 0.6s ease-out;
    }
    
    /* Label floating effect */
    .form-label {
      animation: floatingLabel 0.5s ease-out;
    }
    
    /* Glow effect on form cards */
    @keyframes cardGlow {
      0% { box-shadow: 0 15px 50px rgba(0, 0, 0, 0.08), 0 0 20px rgba(20, 184, 166, 0); }
      50% { box-shadow: 0 15px 50px rgba(0, 0, 0, 0.08), 0 0 20px rgba(20, 184, 166, 0.3); }
      100% { box-shadow: 0 15px 50px rgba(0, 0, 0, 0.08), 0 0 20px rgba(20, 184, 166, 0); }
    }
    
    /* Shimmer loading effect */
    @keyframes shimmer {
      0% { background-position: -1000px 0; }
      100% { background-position: 1000px 0; }
    }
    
    /* Text gradient animation */
    @keyframes textGradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    /* Pulse scale effect */
    @keyframes pulseScale {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    /* Bounce animation */
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    /* Shake animation */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    
    /* Slide down animation */
    @keyframes slideDown {
      from { transform: translateY(-30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    
    /* Swing animation */
    @keyframes swing {
      0% { transform: rotate(0deg); }
      25% { transform: rotate(2deg); }
      50% { transform: rotate(0deg); }
      75% { transform: rotate(-2deg); }
      100% { transform: rotate(0deg); }
    }
    
    /* Success checkmark animation */
    @keyframes checkmark {
      0% { stroke-dashoffset: 50; }
      100% { stroke-dashoffset: 0; }
    }
    
    /* Icon pulse */
    @keyframes iconPulse {
      0% { transform: scale(1) rotate(0deg); }
      50% { transform: scale(1.1) rotate(5deg); }
      100% { transform: scale(1) rotate(0deg); }
    }
    
    /* Input highlight */
    @keyframes inputHighlight {
      0% { box-shadow: 0 0 0 0 rgba(20, 184, 166, 0.7); }
      70% { box-shadow: 0 0 0 15px rgba(20, 184, 166, 0); }
      100% { box-shadow: 0 0 0 0 rgba(20, 184, 166, 0); }
    }
    
    /* Button hover glow */
    .btn-primary:hover::before,
    .btn-success:hover::before,
    .btn-danger:hover::before,
    .btn-warning:hover::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0) 70%);
      border-radius: 0.75rem;
      pointer-events: none;
      animation: hoverGlow 0.6s ease-out;
    }
    
    @keyframes hoverGlow {
      from {
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.5) inset;
      }
      to {
        box-shadow: 0 0 0px rgba(255, 255, 255, 0);
      }
    }
    
    /* Input focus animation enhancement */
    input:focus, select:focus, textarea:focus {
      animation: inputHighlight 0.8s ease-out;
    }
    
    /* Rotate animation */
    @keyframes rotate360 {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    /* Sway animation */
    @keyframes sway {
      0%, 100% { transform: skewY(0deg); }
      50% { transform: skewY(1deg); }
    }
    
    /* Flash animation */
    @keyframes flash {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0.5; }
    }
    
    /* Background color animation */
    @keyframes bgColorShift {
      0% { background-color: rgba(20, 184, 166, 0.05); }
      50% { background-color: rgba(20, 184, 166, 0.15); }
      100% { background-color: rgba(20, 184, 166, 0.05); }
    }
    
    /* Pulse underline */
    @keyframes underlinePulse {
      0%, 100% { width: 0; }
      50% { width: 100%; }
    }
    
    /* Apply animations to elements */
    .card-shadow {
      animation: cardGlow 4s ease-in-out infinite, fadeInUp 0.6s ease-out;
    }
    
    button {
      position: relative;
    }
    
    .section-title {
      position: relative;
      overflow: hidden;
    }
    
    .section-title::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      height: 2px;
      background: linear-gradient(90deg, #14b8a6, transparent);
      animation: underlinePulse 3s ease-in-out infinite;
    }
    
    /* Stagger animation for multiple cards */
    form {
      animation: slideDown 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    
    /* Icon animation */
    svg {
      transition: transform 0.3s ease;
    }
    
    button:hover svg {
      animation: iconPulse 0.6s ease;
    }
    
    /* Bounce on page load */
    header {
      animation: fadeInDown 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    
    h1 {
      animation: bounce 1s ease;
    }
    
    /* Fade in main content */
    main {
      animation: fadeInUp 1s ease-out 0.2s both;
    }
  </style>

 <body class="h-full bg-gradient-to-br from-slate-100 via-blue-50 to-slate-100">
  <div class="h-full overflow-auto">
   <!-- Header -->
   <header class="gradient-header text-white py-4 px-4 shadow-lg">
    <div class="max-w-6xl mx-auto">
     <div class="flex items-center justify-center gap-3">
      <div class="bg-white/20 p-2 rounded-xl">
       <svg class="w-8 h-8" fill="none" stroke="currentColor" viewbox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
       </svg>
      </div>
      <div class="text-center">
       <h1 id="systemTitle" class="text-xl md:text-2xl font-bold">ระบบบันทึกข้อมูล สรุปรายงานการปฏิบัติงาน</h1>
       <p class="text-blue-100 text-sm mt-1">supportewp.doe.go.th</p>
      </div>
     </div>
    </div>
   </header><!-- Main Content -->
   <main class="w-full px-4 lg:px-6 py-6">
    <div class="max-w-4xl mx-auto space-y-4">
     <!-- Search Section -->
     <div class="bg-white rounded-2xl card-shadow p-6 border-l-4 border-amber-500">
      <h3 class="section-title font-bold text-gray-800 mb-4 flex items-center gap-2">
       <svg class="w-5 h-5 text-amber-500" fill="none" stroke="currentColor" viewbox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
       </svg> ค้นหาข้อมูล Case</h3>
      <div class="flex items-center gap-3">
       <input type="text" id="searchCaseNumber" placeholder="ค้นหาหมายเลข Case..." class="flex-1 px-4 py-3 border-2 border-gray-200 rounded-lg input-focus focus:border-amber-500 focus:outline-none text-base"> <button type="button" onclick="searchCase(); return false;" class="btn-warning text-white px-6 py-3 rounded-lg font-semibold flex items-center gap-2 flex-shrink-0">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewbox="0 0 24 24">
         <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
        </svg>ค้นหา</button>
      </div>
     </div><!-- Search Results -->
     <div id="searchResults" class="hidden bg-white rounded-2xl card-shadow p-4 border-l-4 border-amber-500 max-h-96 overflow-y-auto">
      <h3 class="font-semibold text-amber-800 mb-3 text-sm">ผลการค้นหา:</h3>
      <div id="searchResultContent"></div>
     </div><!-- Form -->
     <form id="caseForm" class="bg-white rounded-2xl card-shadow p-6 border-l-4 border-blue-500">
      <h2 class="section-title font-bold text-gray-800 mb-5 flex items-center gap-2">
       <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewbox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
       </svg> บันทึกข้อมูล Case</h2>
      <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-3 gap-4">

        </div>

        <label class="form-label text-gray-700 mb-1.5 block">วันที่ปัจจุบัน</label> <input type="text" id="currentDate" readonly class="w-full px-3 py-2 border-2 border-gray-100 rounded-xl bg-gray-50 text-gray-600 cursor-not-allowed text-sm">
       </div><!-- วันเวลาที่แจ้งสถานะล่าสุด -->
       <div>
        <label class="form-label text-gray-700 mb-1.5 block">วันเวลาที่แจ้งสถานะล่าสุด</label> <input type="text" id="lastStatusDateTime" readonly class="w-full px-3 py-2 border-2 border-gray-100 rounded-xl bg-gray-50 text-gray-600 cursor-not-allowed text-sm">
       </div><!-- ชื่อ-นามสกุล -->
       <div>
        <label class="form-label text-gray-700 mb-1.5 block">ชื่อ-นามสกุล</label> <select id="staffName" required class="w-full px-3 py-2 border-2 border-gray-200 rounded-xl input-focus focus:border-blue-500 focus:outline-none bg-white"> <option value="">-- เลือกชื่อ-นามสกุล --</option> </select>
       </div><!-- กลุ่มงาน -->
       <div>
        <label class="form-label text-gray-700 mb-1.5 block">กลุ่มงาน</label> <select id="workGroup" required class="w-full px-3 py-2 border-2 border-gray-200 rounded-xl input-focus focus:border-blue-500 focus:outline-none bg-white"> <option value="">-- เลือกกลุ่มงาน --</option> <option value="กลุ่ม 1">กลุ่ม 1</option> <option value="กลุ่ม 2">กลุ่ม 2</option> <option value="กลุ่ม 3">กลุ่ม 3</option> <option value="กลุ่ม 4">กลุ่ม 4</option> </select>
       </div><!-- หมายเลข Case -->
       <div>
        <label class="form-label text-gray-700 mb-1.5 block">หมายเลข Case</label> <input type="text" id="caseNumber" required placeholder="ระบุหมายเลข Case" class="w-full px-3 py-2 border-2 border-gray-200 rounded-xl input-focus focus:border-blue-500 focus:outline-none">

      const day = date.getDate();
      const month = thaiMonths[date.getMonth()];
      const year = date.getFullYear() + 543;
      const dayName = thaiDays[date.getDay()];

    // Send data via JSONP
    function sendJSONP(url, data, callback) {
      return new Promise((resolve, reject) => {
        const callbackName = 'jsonp_callback_' + Date.now();
        window[callbackName] = function(response) {
          delete window[callbackName];
          document.body.removeChild(script);
          resolve(response);
          if (callback) callback(response);
        };

        const params = new URLSearchParams(data);
        params.append('callback', callbackName);
        
        const script = document.createElement('script');
        script.src = url + '?' + params.toString();
        script.onerror = function() {
          delete window[callbackName];
          document.body.removeChild(script);
          reject(new Error('JSONP request failed'));
        };
        document.body.appendChild(script);
      });
    }
