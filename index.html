<!doctype html>
<html lang="th" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบบันทึกข้อมูล Case</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            'thai': ['Sarabun', 'sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    * { font-family: 'Sarabun', sans-serif; }
    
    /* Header Gradient with Enhanced Effects */
    .gradient-header {
      background: linear-gradient(135deg, #0d9488 0%, #14b8a6 50%, #2dd4bf 100%);
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(13, 148, 136, 0.3);
    }
    
    .gradient-header::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -200px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
      border-radius: 50%;
      animation: float 8s ease-in-out infinite;
    }
    
    .gradient-header::after {
      content: '';
      position: absolute;
      bottom: -100px;
      left: -100px;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
      border-radius: 50%;
      animation: float 6s ease-in-out infinite reverse;
    }
    
    /* Card Styling with Glassmorphism */
    .card-shadow {
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.1), 0 2px 8px rgba(0, 0, 0, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.6);
      border: 1.5px solid rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
    }
    
    /* Form Elements */
    select, input, textarea {
      font-size: 14px;
      transition: all 0.3s ease;
    }
    
    input:not([readonly]), select, textarea {
      background: linear-gradient(135deg, #f0fdf9 0%, #ffffff 100%) !important;
      border: 2px solid #d1fae5 !important;
    }

    input::placeholder, textarea::placeholder {
      color: #334155 !important;
      font-weight: 500 !important;
      opacity: 1 !important;
    }
    
    input:not([readonly]):focus, select:focus, textarea:focus {
      border: 2px solid #14b8a6 !important;
      box-shadow: 0 0 0 4px rgba(20, 184, 166, 0.15), inset 0 2px 4px rgba(20, 184, 166, 0.05) !important;
      background: #ffffff !important;
      transform: scale(1.01);
    }
    
    input:not([readonly]):hover, select:hover, textarea:hover {
      border: 2px solid #14b8a6 !important;
      box-shadow: 0 4px 16px rgba(20, 184, 166, 0.15) !important;
    }
    
    /* Button Styles - Modern & Premium */
    .btn-primary {
      background: linear-gradient(135deg, #0891b2 0%, #06b6d4 100%);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform: translateY(0);
      box-shadow: 0 6px 20px rgba(6, 182, 212, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.3);
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    
    .btn-primary:hover {
      background: linear-gradient(135deg, #0e7490 0%, #155e75 100%);
      transform: translateY(-5px);
      box-shadow: 0 12px 40px rgba(6, 182, 212, 0.45);
    }
    
    .btn-primary:active {
      transform: translateY(-2px);
    }
    
    .btn-success {
      background: linear-gradient(135deg, #14b8a6 0%, #0d9488 100%);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform: translateY(0);
      box-shadow: 0 6px 20px rgba(20, 184, 166, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.3);
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    
    .btn-success:hover {
      background: linear-gradient(135deg, #0d9488 0%, #134e4a 100%);
      transform: translateY(-5px);
      box-shadow: 0 12px 40px rgba(20, 184, 166, 0.45);
    }
    
    .btn-success:active {
      transform: translateY(-2px);
    }
    
    .btn-danger {
      background: linear-gradient(135deg, #f87171 0%, #ef4444 100%);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform: translateY(0);
      box-shadow: 0 6px 20px rgba(239, 68, 68, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.3);
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    
    .btn-danger:hover {
      background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
      transform: translateY(-5px);
      box-shadow: 0 12px 40px rgba(220, 38, 38, 0.45);
    }
    
    .btn-danger:active {
      transform: translateY(-2px);
    }
    
    /* Status Badge */
    .status-badge {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 20px;
    }
    
    /* Live Status */
    .live-status {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(16px);
      padding: 12px 20px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
      border: 1.5px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15), inset 0 1px 1px rgba(255, 255, 255, 0.3);
      animation: float 3s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    
    .status-dot {
      width: 10px;
      height: 10px;
      background: #ffffff;
      border-radius: 50%;
      animation: pulse 2.5s infinite;
      flex-shrink: 0;
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.3);
    }
    
    @keyframes pulse {
      0%, 100% {
        opacity: 1;
        box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.3);
      }
      50% {
        opacity: 0.9;
      }
      70% {
        box-shadow: 0 0 0 10px rgba(255, 255, 255, 0);
      }
    }
    
    /* Toast Notification */
    .toast-notification {
      position: fixed;
      top: 20px;
      right: 20px;
      background: white;
      border-radius: 16px;
      padding: 16px 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 9999;
      animation: slideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      max-width: 420px;
      border-left: 5px solid;
      backdrop-filter: blur(10px);
    }
    
    @keyframes slideIn {
      from {
        transform: translateX(500px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    
    @keyframes slideOut {
      from {
        transform: translateX(0);
        opacity: 1;
      }
      to {
        transform: translateX(500px);
        opacity: 0;
      }
    }
    
    .toast-notification.success {
      border-left-color: #14b8a6;
    }
    
    .toast-notification.success .toast-icon {
      color: #14b8a6;
      font-size: 24px;
    }
    
    .toast-notification.error {
      border-left-color: #dc2626;
    }
    
    .toast-notification.error .toast-icon {
      color: #dc2626;
      font-size: 24px;
    }
    
    .toast-notification.hide {
      animation: slideOut 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    
    .toast-content {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .toast-title {
      font-weight: 600;
      color: #1f2937;
      font-size: 14px;
    }
    
    .toast-message {
      color: #6b7280;
      font-size: 13px;
    }
    
    /* Form Animation */
    .form-clearing {
      animation: shimmer 0.6s ease-in-out;
    }
    
    @keyframes shimmer {
      0% {
        background: rgba(255, 255, 255, 0);
      }
      50% {
        background: rgba(20, 184, 166, 0.1);
      }
      100% {
        background: rgba(255, 255, 255, 0);
      }
    }
    
    /* Input Focus Animation */
    input:focus, select:focus, textarea:focus {
      animation: inputFocus 0.3s ease-out;
    }
    
    @keyframes inputFocus {
      0% {
        transform: scale(0.98);
      }
      100% {
        transform: scale(1);
      }
    }
    
    /* Card Hover Effect */
    .card-hover {
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform: translateY(0);
      border-radius: 16px;
    }
    
    .card-hover:hover {
      transform: translateY(-10px);
      box-shadow: 0 24px 60px rgba(13, 148, 136, 0.2);
    }
    
    /* Modal Overlay */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9998;
      padding: 16px;
      backdrop-filter: blur(4px);
    }
    
    .modal-overlay.hidden {
      display: none;
    }
    
    .modal-content {
      background: white;
      border-radius: 20px;
      padding: 28px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.25);
      animation: modalSlide 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }
    
    @keyframes modalSlide {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
    
    .modal-title {
      font-size: 18px;
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 12px;
    }
    
    .modal-text {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 20px;
      line-height: 1.6;
    }
    
    .modal-buttons {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }
    
    .modal-button {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s;
    }
    
    .modal-button-primary {
      background: linear-gradient(135deg, #0891b2 0%, #06b6d4 100%);
      color: white;
      box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
    }
    
    .modal-button-primary:hover {
      background: linear-gradient(135deg, #0e7490 0%, #155e75 100%);
      transform: translateY(-2px);
    }
    
    .modal-button-secondary {
      background: #e5e7eb;
      color: #374151;
    }
    
    .modal-button-secondary:hover {
      background: #d1d5db;
    }
    
    .modal-button-danger {
      background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
      color: white;
      box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
    }
    
    .modal-button-danger:hover {
      background: linear-gradient(135deg, #991b1b 0%, #7f1d1d 100%);
      transform: translateY(-2px);
    }
    
    .modal-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .modal-loading {
      text-align: center;
      padding: 20px;
    }
    
    .spinner {
      border: 3px solid #e5e7eb;
      border-top: 3px solid #06b6d4;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 12px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .modal-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    
    .modal-list li {
      padding: 6px 0;
      color: #dc2626;
    }

    /* Page Load Animation */
    @keyframes pageLoadFade {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    header {
      animation: pageLoadFade 0.8s ease-out;
    }

    main {
      animation: pageLoadFade 1s ease-out 0.2s both;
    }

    footer {
      animation: pageLoadFade 0.8s ease-out 1.2s both;
    }

    /* Form Field Entrance Animation */
    .grid > div {
      animation: slideInUp 0.6s ease-out backwards;
    }

    .grid > div:nth-child(1) { animation-delay: 0.1s; }
    .grid > div:nth-child(2) { animation-delay: 0.15s; }
    .grid > div:nth-child(3) { animation-delay: 0.2s; }
    .grid > div:nth-child(4) { animation-delay: 0.25s; }
    .grid > div:nth-child(5) { animation-delay: 0.3s; }
    .grid > div:nth-child(6) { animation-delay: 0.35s; }
    .grid > div:nth-child(7) { animation-delay: 0.4s; }
    .grid > div:nth-child(8) { animation-delay: 0.45s; }
    .grid > div:nth-child(9) { animation-delay: 0.5s; }
    .grid > div:nth-child(10) { animation-delay: 0.55s; }

    @keyframes slideInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Button Ripple Effect */
    button {
      position: relative;
      overflow: hidden;
    }

    button::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.5);
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    button:active::before {
      animation: ripple 0.6s ease-out;
    }

    @keyframes ripple {
      to {
        width: 300px;
        height: 300px;
        opacity: 0;
      }
    }

    /* Input Glow on Focus */
    input:focus, select:focus, textarea:focus {
      box-shadow: 0 0 0 4px rgba(20, 184, 166, 0.15), inset 0 2px 4px rgba(20, 184, 166, 0.05), 0 0 20px rgba(20, 184, 166, 0.25) !important;
    }

    /* Smooth Label Animation */
    label {
      display: block;
      position: relative;
    }

    label::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, #14b8a6, #06b6d4);
      transition: width 0.3s ease;
    }

    label:hover::after {
      width: 100%;
    }

    /* Button Group Animation */
    .flex.flex-wrap.gap-3 {
      animation: staggerIn 0.8s ease-out;
    }

    @keyframes staggerIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* Search Results Slide In */
    #searchResultsCard {
      animation: slideInCard 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes slideInCard {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Data Display Cards Stagger */
    .grid.grid-cols-1.md\\:grid-cols-2 > div {
      animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
    }

    .grid.grid-cols-1.md\\:grid-cols-2 > div:nth-child(1) { animation-delay: 0.05s; }
    .grid.grid-cols-1.md\\:grid-cols-2 > div:nth-child(2) { animation-delay: 0.1s; }
    .grid.grid-cols-1.md\\:grid-cols-2 > div:nth-child(3) { animation-delay: 0.15s; }
    .grid.grid-cols-1.md\\:grid-cols-2 > div:nth-child(4) { animation-delay: 0.2s; }
    .grid.grid-cols-1.md\\:grid-cols-2 > div:nth-child(5) { animation-delay: 0.25s; }
    .grid.grid-cols-1.md\\:grid-cols-2 > div:nth-child(6) { animation-delay: 0.3s; }
    .grid.grid-cols-1.md\\:grid-cols-2 > div:nth-child(7) { animation-delay: 0.35s; }
    .grid.grid-cols-1.md\\:grid-cols-2 > div:nth-child(8) { animation-delay: 0.4s; }
    .grid.grid-cols-1.md\\:grid-cols-2 > div:nth-child(9) { animation-delay: 0.45s; }
    .grid.grid-cols-1.md\\:grid-cols-2 > div:nth-child(10) { animation-delay: 0.5s; }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.9) rotateX(-10deg);
      }
      to {
        opacity: 1;
        transform: scale(1) rotateX(0deg);
      }
    }

    /* Success Badge Pulse */
    @keyframes successPulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.05);
      }
    }

    /* Smooth Scroll */
    html {
      scroll-behavior: smooth;
    }

    /* Text Selection Enhancement */
    ::selection {
      background: linear-gradient(135deg, #0891b2, #06b6d4);
      color: white;
    }

    /* Focus Visible for Accessibility */
    *:focus-visible {
      outline: 2px solid #14b8a6;
      outline-offset: 2px;
    }

    body { box-sizing: border-box; }
  </style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full bg-gradient-to-br from-cyan-50 via-teal-50 to-emerald-50">
  <div class="h-full overflow-auto"><!-- Header -->
   <header class="gradient-header text-white py-6 px-6 shadow-2xl">
    <div class="max-w-6xl mx-auto">
     <div class="flex items-center justify-between mb-4">
      <div></div>
      <div class="live-status">
       <div class="status-dot"></div><span>ระบบออนไลน์ ✨</span>
      </div>
     </div>
     <h1 id="systemTitle" class="text-3xl md:text-4xl font-bold text-center">ระบบบันทึกข้อมูล สรุปรายงานการปฏิบัติงาน</h1>
     <p class="text-center text-cyan-100 text-sm mt-2"><a href="https://supportewp.doe.go.th" target="_blank" rel="noopener noreferrer" class="hover:text-white underline transition-all"> https://supportewp.doe.go.th </a></p>
    </div>
   </header>
   <main class="max-w-6xl mx-auto p-4 md:p-8"><!-- Action Buttons -->
    <div class="flex flex-wrap gap-3 mb-8 justify-center"><button onclick="showSearchModal()" class="bg-gradient-to-r from-teal-500 to-cyan-500 hover:from-teal-600 hover:to-cyan-600 text-white px-6 py-3 rounded-lg font-semibold shadow-lg transition-all flex items-center gap-2 transform hover:-translate-y-1">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24">
       <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
      </svg> เรียกดูข้อมูล Case จากฐานข้อมูล </button>
    </div><!-- Form Card -->
    <div class="bg-white rounded-3xl card-shadow p-6 md:p-8 mb-8 card-hover">
     <div class="flex items-center gap-4 mb-6 pb-6 border-b-2 border-cyan-100">
      <div class="w-12 h-12 bg-gradient-to-br from-cyan-500 to-teal-600 rounded-2xl flex items-center justify-center shadow-lg">
       <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
       </svg>
      </div>
      <h2 class="text-2xl font-bold text-gray-800">บันทึกข้อมูล Case</h2>
     </div>
     <form id="caseForm" onsubmit="submitForm(event)">
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"><!-- ลำดับที่ -->
       <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">ลำดับที่ <span class="text-xs text-gray-500">(อัตโนมัติ)</span></label> <input type="text" id="sequence" name="sequence" readonly placeholder="ไม่ต้องกรอก กลัวจะเหนื่อย" class="w-full px-4 py-2.5 border-2 border-gray-200 rounded-xl bg-gray-50 text-gray-600 placeholder-gray-500 cursor-not-allowed font-medium">
       </div><!-- วันที่ปัจจุบัน -->
       <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">วันที่ปัจจุบัน</label> <input type="text" id="currentDate" name="currentDate" readonly class="w-full px-4 py-2.5 border-2 border-gray-200 rounded-xl bg-gray-50 text-gray-600 cursor-not-allowed">

  <script>
    // Configuration
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwMcGMpXNVcgn8vJBcqnUDqgL2aIl-rNmYOFsmhGX81iYEWh0_i6hY3fXJVCCC_6xwD/exec';
    
    // Default configuration
    const defaultConfig = {
      system_title: 'ระบบบันทึกข้อมูล สรุปรายงานการปฏิบัติงาน'
    };

    let currentEditingRow = null;
    let isEditMode = false;

    // Initialize
    document.addEventListener('DOMContentLoaded', function() {
      updateDateTime();
      setInterval(updateDateTime, 1000);
    });

    // Toast notification function
    function showToast(type, title, message) {
      const toast = document.createElement('div');
      toast.className = `toast-notification ${type}`;
      toast.innerHTML = `
        <span class="toast-icon">${type === 'success' ? '✓' : '✕'}</span>
        <div class="toast-content">
          <div class="toast-title">${title}</div>
          <div class="toast-message">${message}</div>
        </div>
      `;
      document.body.appendChild(toast);
      
      // Auto remove after 3 seconds
      setTimeout(() => {
        toast.classList.add('hide');
        setTimeout(() => toast.remove(), 400);
      }, 3000);
    }

    // Show modal dialog
    function showModal(type, title, text, onConfirm = null) {
      let overlay = document.getElementById('genericModal');
      if (!overlay) {
        overlay = document.createElement('div');
        overlay.id = 'genericModal';
        overlay.className = 'modal-overlay';
        document.body.appendChild(overlay);
      }

      let buttonClass = 'modal-button-primary';
      if (type === 'error') buttonClass = 'modal-button-danger';
      if (type === 'warning') buttonClass = 'modal-button-primary';
      if (type === 'info') buttonClass = 'modal-button-primary';

      let icon = '✓';
      if (type === 'error') icon = '✕';
      if (type === 'warning') icon = '⚠';
      if (type === 'info') icon = 'ℹ';

      overlay.innerHTML = `
        <div class="modal-content">
          <div style="text-align: center; margin-bottom: 16px; font-size: 32px;">
            ${icon}
          </div>
          <h2 class="modal-title">${title}</h2>
          <p class="modal-text">${text}</p>
          <div class="modal-buttons">
            <button class="modal-button modal-button-${type === 'error' ? 'danger' : 'primary'}" onclick="closeModal()">
              ตกลง
            </button>
          </div>
        </div>
      `;

      overlay.classList.remove('hidden');
      overlay.onclick = function(e) {
        if (e.target === overlay) closeModal();
      };

      if (onConfirm) {
        setTimeout(onConfirm, 300);
      }
    }

    // Show confirmation dialog
    function showConfirmModal(title, text, onConfirm, onCancel = null) {
      let overlay = document.getElementById('confirmModal');
      if (!overlay) {
        overlay = document.createElement('div');
        overlay.id = 'confirmModal';
        overlay.className = 'modal-overlay';
        document.body.appendChild(overlay);
      }

      overlay.innerHTML = `
        <div class="modal-content">
          <div style="text-align: center; margin-bottom: 16px; font-size: 32px;">❓</div>
          <h2 class="modal-title">${title}</h2>
          <p class="modal-text">${text}</p>
          <div class="modal-buttons">
            <button class="modal-button modal-button-secondary" onclick="closeConfirmModal()">
              ยกเลิก
            </button>
            <button class="modal-button modal-button-primary" onclick="confirmAction()">
              ยืนยัน
            </button>
          </div>
        </div>
      `;

      overlay.classList.remove('hidden');

      window.confirmAction = function() {
        closeConfirmModal();
        if (onConfirm) onConfirm();
      };

      overlay.onclick = function(e) {
        if (e.target === overlay) closeConfirmModal();
      };
    }

    // Show loading modal
    function showLoadingModal(message = 'กำลังบันทึกข้อมูล...') {
      let overlay = document.getElementById('loadingModal');
      if (!overlay) {
        overlay = document.createElement('div');
        overlay.id = 'loadingModal';
        overlay.className = 'modal-overlay';
        document.body.appendChild(overlay);
      }

      overlay.innerHTML = `
        <div class="modal-content">
          <div class="modal-loading">
            <div class="spinner"></div>
            <p style="color: #6b7280; font-size: 14px;">${message}</p>
          </div>
        </div>
      `;

      overlay.classList.remove('hidden');
    }

    function closeLoadingModal() {
      const overlay = document.getElementById('loadingModal');
      if (overlay) overlay.classList.add('hidden');
    }

    function closeModal() {
      const overlay = document.getElementById('genericModal');
      if (overlay) overlay.classList.add('hidden');
    }

    function closeConfirmModal() {
      const overlay = document.getElementById('confirmModal');
      if (overlay) overlay.classList.add('hidden');
    }

    // Format Thai Date Time
    function formatThaiDateTime(date) {
      const thaiMonths = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน', 
                         'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];
      const thaiYear = date.getFullYear() + 543;
      const day = date.getDate();
      const month = thaiMonths[date.getMonth()];
      const hours = String(date.getHours()).padStart(2, '0');
      const minutes = String(date.getMinutes()).padStart(2, '0');
      const seconds = String(date.getSeconds()).padStart(2, '0');
      
      return `${day} ${month} ${thaiYear} เวลา ${hours}:${minutes}:${seconds} น.`;
    }

    // Update date time fields
    function updateDateTime() {
      const now = new Date();
      const thaiDateTime = formatThaiDateTime(now);
      document.getElementById('currentDate').value = thaiDateTime;
      document.getElementById('lastStatusDateTime').value = thaiDateTime;
    }

    // Enable edit mode
    function enableEdit() {
      isEditMode = true;
      showModal('info', 'โหมดแก้ไขข้อมูล', 'คุณสามารถแก้ไขข้อมูลในฟอร์มได้แล้ว กรุณาแก้ไขข้อมูลแล้วกดบันทึก');
    }

    function clearForm() {
      Swal.fire({
        icon: 'question',
        title: 'ยืนยันการล้างฟอร์ม',
        text: 'คุณต้องการล้างข้อมูลในฟอร์มทั้งหมดหรือไม่?',
        showCancelButton: true,
        confirmButtonText: 'ยืนยัน',
        cancelButtonText: 'ยกเลิก',
        confirmButtonColor: '#dc2626',
        cancelButtonColor: '#6b7280',
        background: '#ffffff',
        didOpen: (modal) => {
          modal.querySelector('.swal2-title').style.fontSize = '18px';
          modal.querySelector('.swal2-title').style.fontWeight = '700';
        }
      }).then((result) => {
        if (result.isConfirmed) {
          const form = document.getElementById('caseForm');
          form.classList.add('form-clearing');
          
          setTimeout(() => {
            document.getElementById('caseForm').reset();
            updateDateTime();
            currentEditingRow = null;
            isEditMode = false;
            document.getElementById('searchResultsCard').classList.add('hidden');
            form.classList.remove('form-clearing');
            
          Swal.fire({
            icon: 'success',
            title: 'ล้างฟอร์มเรียบร้อย ✨',
            text: 'ฟอร์มถูกรีเซ็ตแล้ว พร้อมกรอกข้อมูลใหม่',
            confirmButtonText: 'ตกลง',
            confirmButtonColor: '#14b8a6',
            background: '#ffffff',
            timer: 2000,
            timerProgressBar: true,
            didOpen: (modal) => {
              modal.querySelector('.swal2-title').style.fontSize = '18px';
              modal.querySelector('.swal2-title').style.fontWeight = '700';
            }

      let missingFields = [];

    // JSONP function
    function sendJSONP(data, callback) {
      const callbackName = 'jsonpCallback_' + Date.now();
      
      window[callbackName] = function(response) {
        callback(response);
        delete window[callbackName];
        const script = document.getElementById(callbackName);
        if (script) script.remove();
      };

      const params = new URLSearchParams();
      params.append('callback', callbackName);
      for (const key in data) {
        params.append(key, data[key] || '');
      }

      const script = document.createElement('script');
      script.id = callbackName;
      script.src = SCRIPT_URL + '?' + params.toString();
      script.onerror = function() {
        callback({ success: false, message: 'Network error' });
        delete window[callbackName];
        script.remove();
      };
      document.body.appendChild(script);

      // Timeout after 30 seconds
      setTimeout(function() {
        if (window[callbackName]) {
          callback({ success: false, message: 'Request timeout' });
          delete window[callbackName];
          const s = document.getElementById(callbackName);
          if (s) s.remove();
        }
      }, 30000);
    }
